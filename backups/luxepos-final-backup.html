    /**
     * Récupère les données du graphique selon la période
     */
    function getChartData(period, startDate, endDate) {
        const sales = window.store.state.sales || [];
        const now = new Date();

        if (period === 'day') {
            // Données par heure pour aujourd'hui
            const hours = Array.from({ length: 24 }, (_, i) => i);
            const labels = hours.map(h => `${h}h`);
            const data = hours.map(h => {
                const hourSales = sales.filter(s => {
                    const saleDate = new Date(s.date);
                    return saleDate.getDate() === now.getDate() &&
                           saleDate.getMonth() === now.getMonth() &&
                           saleDate.getFullYear() === now.getFullYear() &&
                           saleDate.getHours() === h;
                });
                return hourSales.reduce((sum, s) => sum + s.total, 0);
            });
            return { labels, data };

        } else if (period === 'week') {
            // Données des 7 derniers jours
            const days = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
            const labels = [];
            const data = [];

            for (let i = 6; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                labels.push(days[date.getDay()]);

                const daySales = sales.filter(s => {
                    const saleDate = new Date(s.date);
                    return saleDate.getDate() === date.getDate() &&
                           saleDate.getMonth() === date.getMonth() &&
                           saleDate.getFullYear() === date.getFullYear();
                });
                data.push(daySales.reduce((sum, s) => sum + s.total, 0));
            }
            return { labels, data };

        } else if (period === 'month') {
            // Données des 30 derniers jours
            const labels = [];
            const data = [];

            for (let i = 29; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                labels.push(`${date.getDate()}/${date.getMonth() + 1}`);

                const daySales = sales.filter(s => {
                    const saleDate = new Date(s.date);
                    return saleDate.getDate() === date.getDate() &&
                           saleDate.getMonth() === date.getMonth() &&
                           saleDate.getFullYear() === date.getFullYear();
                });
                data.push(daySales.reduce((sum, s) => sum + s.total, 0));
            }
            return { labels, data };

        } else if (period === 'custom' && startDate && endDate) {
            // Données entre deux dates
            const start = new Date(startDate);
            const end = new Date(endDate);
            const labels = [];
            const data = [];

            const daysDiff = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;

            for (let i = 0; i < daysDiff; i++) {
                const date = new Date(start);
                date.setDate(date.getDate() + i);
                labels.push(`${date.getDate()}/${date.getMonth() + 1}`);

                const daySales = sales.filter(s => {
                    const saleDate = new Date(s.date);
                    return saleDate.getDate() === date.getDate() &&
                           saleDate.getMonth() === date.getMonth() &&
                           saleDate.getFullYear() === date.getFullYear();
                });
                data.push(daySales.reduce((sum, s) => sum + s.total, 0));
            }
            return { labels, data };
        }

        // Par défaut, semaine
        return getChartData('week');
    }

    /**
     * Animation de compteur pour les chiffres
     */
    function animateCounter(element, target, duration = 1000) {
        const start = 0;
        const increment = target / (duration / 16);
        let current = start;

        const timer = setInterval(() => {
            current += increment;
            if (current >= target) {
                current = target;
                clearInterval(timer);
            }
            element.textContent = formatCurrency(Math.floor(current));
        }, 16);
    }

    /**
     * Effet confetti minimaliste
     */
    function launchConfetti() {
        if (typeof confetti === 'undefined') return;

        const duration = 2000;
        const end = Date.now() + duration;

        const colors = ['#10b981', '#34d399', '#059669'];

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: colors,
                disableForReducedMotion: true,
                scalar: 0.8
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: colors,
                disableForReducedMotion: true,
                scalar: 0.8
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }

    /**
     * Effet ripple sur les boutons
     */
    function createRipple(event) {
        const button = event.currentTarget;
        const circle = document.createElement('span');
        const diameter = Math.max(button.clientWidth, button.clientHeight);
        const radius = diameter / 2;

        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - button.offsetLeft - radius}px`;
        circle.style.top = `${event.clientY - button.offsetTop - radius}px`;
        circle.classList.add('ripple');

        const ripple = button.getElementsByClassName('ripple')[0];
        if (ripple) {
            ripple.remove();
        }

        button.appendChild(circle);
    }

    /**
     * Fonction pour corriger les couleurs de texte en mode clair
     */
    function fixTextColors() {
        // Sélectionner tous les éléments avec text-white
        const whiteTexts = document.querySelectorAll('.text-white');

        whiteTexts.forEach(el => {
            // Vérifier si l'élément est dans un fond coloré
            const hasColoredBg = el.closest('.bg-brand, .bg-gradient-to-r, [class*="bg-green"], [class*="bg-purple"], [class*="bg-red"], [class*="bg-blue"], [class*="bg-orange"]');

            if (!hasColoredBg && !el.classList.contains('text-white-force')) {
                // Appliquer la couleur adaptative
                el.style.color = 'var(--text-primary)';
            }
        });

        // Corriger les text-gray
        document.querySelectorAll('.text-gray-400, .text-gray-500, .text-gray-600').forEach(el => {
            el.style.color = 'var(--text-secondary)';
        });
    }

    <script>
    /**
     * ┌─────────────────────────────────────────────────────────────────────┐
     * │ LuxePOS - Système de Gestion pour Bijouterie de Luxe v3.0          │
     * │ Nouvelles fonctionnalités:                                          │
     * │ - Upload d'images locales avec conversion Base64                    │
     * │ - Sélection multiple de couleurs pour les produits                  │
     * └─────────────────────────────────────────────────────────────────────┘
     */

    'use strict';

    // ─────────────────────────────────────────────────────────────────────────────────
    // UTILITAIRES GLOBAUX
    // ─────────────────────────────────────────────────────────────────────────────────

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => document.querySelectorAll(selector);

    /**
     * Palette de couleurs prédéfinies pour bijouterie
     */
    const COLOR_PALETTE = {
        'Or Jaune': '#FFD700',
        'Or Rose': '#E5A590',
        'Or Blanc': '#E8E8E8',
        'Argent': '#C0C0C0',
        'Platine': '#E5E4E2',
        'Rouge': '#DC2626',
        'Bleu': '#2563EB',
        'Vert': '#16A34A',
        'Noir': '#1F2937',
        'Rose': '#EC4899',
        'Violet': '#9333EA',
        'Turquoise': '#14B8A6'
    };

    /**
     * Formatteur de devise avec internationalisation
     */
    const formatCurrency = (amount) => {
        const currency = window.store?.state?.settings?.currency || 'EUR';
        try {
            return new Intl.NumberFormat('fr-FR', {
                style: 'currency',
                currency: currency,
                maximumFractionDigits: 0
            }).format(amount || 0);
        } catch (error) {
            console.error('Format currency error:', error);
            return `${amount} ${currency}`;
        }
    };

    /**
     * Générateur d'ID unique
     */
    const generateId = () => {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
    };

    /**
     * Debounce pour optimiser les performances
     */
    const debounce = (func, wait) => {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    };

    /**
     * Convertir une image en Base64
     */
    const imageToBase64 = (file) => {
        return new Promise((resolve, reject) => {
            if (!file.type.startsWith('image/')) {
                reject(new Error('Le fichier n\'est pas une image'));
                return;
            }

            // Vérifier la taille (max 2MB pour performance)
            if (file.size > 2 * 1024 * 1024) {
                reject(new Error('L\'image est trop volumineuse (max 2MB)'));
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = (error) => reject(error);
            reader.readAsDataURL(file);
        });
    };

        /**
         * Sauvegarde hybride (LocalStorage + Firebase)
         */
        save() {
            try {
                // Sauvegarde locale synchrone
                localStorage.setItem('luxepos_data', JSON.stringify(this.state));

                // Notification des listeners
                this.notify();

                // Synchronisation cloud asynchrone
                if (this.firebaseDb && this.state.isOnline) {
                    this.syncToFirebase();
                }
            } catch (error) {
                console.error('Erreur de sauvegarde:', error);
                window.ui?.toast('Erreur lors de la sauvegarde', 'error');
            }
        }

        /**
         * Abonnement aux changements d'état
         */
        subscribe(listener) {
            if (typeof listener === 'function') {
                this.listeners.push(listener);
            }
        }

        /**
         * Notification de tous les listeners
         */
        notify() {
            this.listeners.forEach(listener => {
                try {
                    listener(this.state);
                } catch (error) {
                    console.error('Erreur dans listener:', error);
                }
            });
        }

        /**
         * Gestion des événements réseau
         */
        initNetworkListeners() {
            window.addEventListener('online', () => {
                this.state.isOnline = true;
                this.notify();
                window.ui?.toast('Connexion rétablie', 'success');
                if (this.firebaseDb) this.syncFromFirebase();
            });

            window.addEventListener('offline', () => {
                this.state.isOnline = false;
                this.notify();
                window.ui?.toast('Mode hors ligne activé', 'warning');
            });
        }

        /**
         * Obtenir les alertes de stock
         */
        getStockAlerts() {
            const threshold = this.state.settings.stockAlertThreshold || 5;
            return this.state.products.filter(p => p.stock > 0 && p.stock <= threshold);
        }

        /**
         * Obtenir les produits en rupture de stock
         */
        getOutOfStockProducts() {
            return this.state.products.filter(p => p.stock === 0);
        }

        /**
         * Obtenir les statistiques de ventes
         */
        getSalesStats() {
            const sales = this.state.sales || [];

            // Top 10 produits vendus
            const productSales = {};
            sales.forEach(sale => {
                sale.items.forEach(item => {
                    if (!productSales[item.id]) {
                        productSales[item.id] = {
                            id: item.id,
                            name: item.name,
                            totalQty: 0,
                            totalRevenue: 0
                        };
                    }
                    productSales[item.id].totalQty += item.qty;
                    productSales[item.id].totalRevenue += item.price * item.qty;
                });
            });

            const topProducts = Object.values(productSales)
                .sort((a, b) => b.totalRevenue - a.totalRevenue)
                .slice(0, 10);

            // Ventes par catégorie
            const categorySales = {};
            sales.forEach(sale => {
                sale.items.forEach(item => {
                    const product = this.state.products.find(p => p.id === item.id);
                    const category = product?.category || 'Non catégorisé';
                    if (!categorySales[category]) {
                        categorySales[category] = { revenue: 0, count: 0 };
                    }
                    categorySales[category].revenue += item.price * item.qty;
                    categorySales[category].count += item.qty;
                });
            });

            // Performance mensuelle (12 derniers mois)
            const monthlyPerformance = {};
            const now = new Date();
            for (let i = 11; i >= 0; i--) {
                const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                monthlyPerformance[key] = { revenue: 0, count: 0 };
            }

            sales.forEach(sale => {
                const saleDate = new Date(sale.date);
                const key = `${saleDate.getFullYear()}-${String(saleDate.getMonth() + 1).padStart(2, '0')}`;
                if (monthlyPerformance[key]) {
                    monthlyPerformance[key].revenue += sale.total;
                    monthlyPerformance[key].count++;
                }
            });

            // Clients VIP (top 5)
            const clientPurchases = {};
            sales.forEach(sale => {
                if (sale.clientId) {
                    if (!clientPurchases[sale.clientId]) {
                        const client = this.state.clients.find(c => c.id === sale.clientId);
                        clientPurchases[sale.clientId] = {
                            client: client,
                            totalSpent: 0,
                            purchaseCount: 0
                        };
                    }
                    clientPurchases[sale.clientId].totalSpent += sale.total;
                    clientPurchases[sale.clientId].purchaseCount++;
                }
            });

            const topClients = Object.values(clientPurchases)
                .sort((a, b) => b.totalSpent - a.totalSpent)
                .slice(0, 5);

            return {
                topProducts,
                categorySales,
                monthlyPerformance,
                topClients
            };
        }

        /**
         * Ajouter au panier
         */
        addToCart(product) {
            if (!product || product.stock <= 0) {
                window.ui?.toast(`⚠️ "${product?.name || 'Ce produit'}" est en rupture de stock`, 'error');
                return;
            }

            const existing = this.state.cart.find(item => item.id === product.id);
            if (existing) {
                if (existing.qty < product.stock) {
                    existing.qty++;
                    window.ui?.toast('Quantité augmentée', 'success');
                } else {
                    window.ui?.toast('Stock insuffisant', 'error');
                    return;
                }
            } else {
                this.state.cart.push({ ...product, qty: 1 });
                window.ui?.toast(`${product.name} ajouté au panier`, 'success');
            }
            this.notify();
        }

        /**
         * Modifier la quantité dans le panier
         */
        updateCartQty(itemId, delta) {
            // itemId peut être soit l'ID du produit, soit l'ID de variante (productId_vX)
            const item = this.state.cart.find(i => (i.variantId || i.id) === itemId);
            if (!item) return;

            const newQty = item.qty + delta;

            if (newQty <= 0) {
                // Retirer du panier
                this.state.cart = this.state.cart.filter(i => (i.variantId || i.id) !== itemId);
            } else {
                // Vérifier le stock disponible
                const maxStock = item.stock; // Le stock est déjà sur l'item (stock de la variante ou du produit)
                if (newQty <= maxStock) {
                    item.qty = newQty;
                } else {
                    window.ui?.toast('Stock maximum atteint', 'warning');
                }
            }
            this.notify();
        }

        /**
         * Finaliser la vente
         */
        checkout() {
            if (this.state.cart.length === 0) {
                window.ui?.toast('Le panier est vide', 'warning');
                return;
            }

            const sale = {
                id: generateId(),
                date: new Date().toISOString(),
                items: [...this.state.cart],
                total: this.state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0),
                clientId: this.state.currentClient
            };

            // Mise à jour du stock
            sale.items.forEach(cartItem => {
                const product = this.state.products.find(p => p.id === cartItem.id);
                if (product) {
                    if (cartItem.variantIndex !== undefined && product.hasVariants && product.variants) {
                        // C'est une variante, déduire le stock de la variante spécifique
                        const variant = product.variants[cartItem.variantIndex];
                        if (variant) {
                            variant.stock -= cartItem.qty;
                            // Recalculer le stock total du produit
                            product.stock = product.variants.reduce((sum, v) => sum + (v.stock || 0), 0);
                        }
                    } else {
                        // Produit simple, déduire du stock global
                        product.stock -= cartItem.qty;
                    }
                }
            });

            // Mise à jour des stats client
            if (this.state.currentClient) {
                const client = this.state.clients.find(c => c.id === this.state.currentClient);
                if (client) {
                    client.totalSpent += sale.total;
                    client.purchaseCount += 1;
                    client.lastPurchase = sale.date;
                }
            }

            this.state.sales.push(sale);
            this.state.cart = [];
            this.state.currentClient = null;
            this.save();
            window.ui?.toast(`Vente enregistrée : ${formatCurrency(sale.total)}`, 'success');

            // Lancer confetti minimaliste
            if (typeof launchConfetti === 'function') {
                launchConfetti();
            }

            // Proposer d'imprimer la facture avec une modale personnalisée
            setTimeout(() => {
                window.ui?.showPrintInvoiceDialog(sale);
            }, 500);
        }

        /**
         * Mettre à jour les paramètres
         */
        updateSettings(newSettings) {
            this.state.settings = { ...this.state.settings, ...newSettings };
            this.updateTheme();
            this.save();

            if (newSettings.firebaseConfig) {
                this.initFirebase();
            }

            // Mettre à jour l'affichage du logo si modifié
            if (newSettings.hasOwnProperty('logo')) {
                window.ui?.updateLogoDisplay();
            }
        }

        /**
         * Mise à jour du thème visuel
         */
        updateTheme() {
            const root = document.documentElement;
            const color = this.state.settings.accentColor;

            root.style.setProperty('--brand-main', color);
            root.style.setProperty('--brand-light', this.adjustColor(color, 40));
            root.style.setProperty('--brand-dark', this.adjustColor(color, -30));
        }

        /**
         * Ajustement de luminosité de couleur
         */
        adjustColor(color, percent) {
            const num = parseInt(color.replace("#", ""), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, Math.max(0, (num >> 16) + amt));
            const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
            const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
            return "#" + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        // ──────────────────────────────────────────────────────────────────
        // SYNCHRONISATION FIREBASE
        // ──────────────────────────────────────────────────────────────────

        /**
         * Initialisation de Firebase
         */
        initFirebase() {
            const configStr = this.state.settings.firebaseConfig;
            if (!configStr || configStr.trim() === '') return;

            try {
                const config = JSON.parse(configStr);

                if (window.firebase.apps && window.firebase.apps.length > 0) {
                    this.firebaseDb = firebase.firestore();
                } else {
                    firebase.initializeApp(config);
                    this.firebaseDb = firebase.firestore();

                    this.firebaseDb.enablePersistence({ synchronizeTabs: true })
                        .then(() => {
                            console.log('✅ Firebase persistence activée');
                            this.syncFromFirebase();
                        })
                        .catch(err => {
                            if (err.code === 'failed-precondition') {
                                console.warn("⚠️ Persistence échouée: Onglets multiples ouverts");
                            } else if (err.code === 'unimplemented') {
                                console.warn("⚠️ Persistence non supportée par le navigateur");
                            }
                        });
                }

                window.ui?.toast('Firebase connecté', 'success');
            } catch (e) {
                console.error("❌ Erreur configuration Firebase:", e);
                window.ui?.toast("Erreur dans la configuration Firebase", "error");
            }
        }

        /**
         * Synchronisation vers Firebase
         */
        syncToFirebase() {
            if (!this.firebaseDb) return;

            this.firebaseDb.collection('stores').doc('main_store').set({
                products: this.state.products,
                sales: this.state.sales,
                settings: this.state.settings,
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true })
            .then(() => console.log("☁️ Sync cloud OK"))
            .catch(err => console.error("❌ Sync cloud échoué:", err));
        }

        /**
         * Synchronisation depuis Firebase (temps réel)
         */
        syncFromFirebase() {
            if (!this.firebaseDb) return;

            this.firebaseDb.collection('stores').doc('main_store').onSnapshot(
                doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.products) this.state.products = data.products;
                        if (data.sales) this.state.sales = data.sales;
                        if (data.settings) this.state.settings = data.settings;

                        localStorage.setItem('luxepos_data', JSON.stringify(this.state));
                        this.notify();
                    }
                },
                error => {
                    console.error("❌ Erreur sync Firebase:", error);
                }
            );
        }
    }

                                <span class="text-xs font-medium" style="color: var(--text-secondary);">En direct</span>

        }

        /**
         * Rendu d'une carte KPI améliorée
         */
        renderKPI(title, value, color, subtitle, icon) {
            const colorMap = {
                'brand': { main: '#10b981', light: '#34d399', bg: 'rgba(16, 185, 129, 0.1)' },
                'purple-500': { main: '#a855f7', light: '#c084fc', bg: 'rgba(168, 85, 247, 0.1)' },
                'blue-500': { main: '#3b82f6', light: '#60a5fa', bg: 'rgba(59, 130, 246, 0.1)' }
            };
            const colorInfo = colorMap[color] || colorMap['brand'];

            return `
                <div class="glass-card tilt-card p-6 rounded-2xl relative overflow-visible group cursor-pointer hover:shadow-2xl transition-all duration-500"
                     style="background: var(--glass-bg); border: 1px solid var(--border-color);">

                    <!-- Gradient animé de fond -->
                    <div class="absolute -right-8 -top-8 w-40 h-40 rounded-full blur-3xl opacity-30 group-hover:opacity-50 transition-all duration-700 group-hover:scale-150"
                         style="background: linear-gradient(135deg, ${colorInfo.main}, ${colorInfo.light});"></div>

                    <!-- Contenu -->
                    <div class="relative z-10">
                        <!-- En-tête avec icône -->
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 rounded-xl flex items-center justify-center shadow-lg transition-all duration-300 group-hover:scale-110 group-hover:rotate-6"
                                 style="background: linear-gradient(135deg, ${colorInfo.main}, ${colorInfo.light});">
                                <i data-lucide="${icon}" class="w-6 h-6 text-white"></i>
                            </div>
                            <div class="w-8 h-8 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300"
                                 style="background: ${colorInfo.bg};">
                                <i data-lucide="arrow-up-right" class="w-4 h-4" style="color: ${colorInfo.main};"></i>
                            </div>
                        </div>

                        <!-- Titre -->
                        <h3 class="text-xs font-bold mb-2 uppercase tracking-widest" style="color: var(--text-tertiary);">${title}</h3>

                        <!-- Valeur principale avec animation de compteur -->
                        <div class="text-4xl font-black mb-3 transition-all duration-300 group-hover:scale-105"
                             style="color: var(--text-primary); font-variant-numeric: tabular-nums;"
                             data-kpi-value="${value}">
                            ${formatCurrency(value)}
                        </div>

                        <!-- Badge sous-titre -->
                        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg font-medium text-xs transition-all duration-300 group-hover:shadow-lg"
                             style="background: ${colorInfo.bg}; color: ${colorInfo.main};">
                            <i data-lucide="trending-up" class="w-3.5 h-3.5"></i>
                            <span class="font-bold">${subtitle}</span>
                        </div>
                    </div>

                    <!-- Particules décoratives -->
                    <div class="absolute top-4 right-4 w-2 h-2 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 group-hover:animate-ping"
                         style="background: ${colorInfo.light};"></div>
                    <div class="absolute bottom-6 left-6 w-1.5 h-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-500 delay-100"
                         style="background: ${colorInfo.main};"></div>
                </div>
            `;
        }

        /**
         * Rendu des rapports de ventes
         */
        renderSalesReports() {
            const stats = window.store.getSalesStats();

            return `
                <!-- Section Rapports -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
                    <!-- Top Produits -->
                    <div class="glass-card p-6 rounded-2xl" style="background: var(--glass-bg); border: 1px solid var(--border-color);">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-lg font-bold flex items-center gap-3" style="color: var(--text-primary);">
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-purple-700 flex items-center justify-center shadow-lg">
                                    <i data-lucide="star" class="w-5 h-5 text-white"></i>
                                </div>
                                Top Produits
                            </h3>
                            <span class="text-xs px-3 py-1 rounded-full" style="background: var(--bg-tertiary); color: var(--text-secondary);">
                                ${stats.topProducts.length} produits
                            </span>
                        </div>
                        <div class="space-y-3 max-h-96 overflow-y-auto">
                            ${stats.topProducts.length === 0 ? `
                                <p class="text-center text-sm py-8" style="color: var(--text-tertiary);">Aucune vente enregistrée</p>
                            ` : stats.topProducts.map((product, index) => `
                                <div class="flex items-center gap-3 p-3 rounded-lg transition-all hover:shadow-md" style="background: var(--bg-tertiary);">
                                    <div class="text-2xl font-bold w-8" style="color: ${index === 0 ? '#FFD700' : index === 1 ? '#C0C0C0' : index === 2 ? '#CD7F32' : 'var(--text-tertiary)'};">
                                        ${index + 1}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="font-medium truncate" style="color: var(--text-primary);">${product.name}</div>
                                        <div class="text-xs" style="color: var(--text-tertiary);">${product.totalQty} vente${product.totalQty > 1 ? 's' : ''}</div>
                                    </div>
                                    <div class="text-right">
                                        <div class="font-bold" style="color: var(--brand);">${formatCurrency(product.totalRevenue)}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Ventes par Catégorie -->
                    <div class="glass-card p-6 rounded-2xl" style="background: var(--glass-bg); border: 1px solid var(--border-color);">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-lg font-bold flex items-center gap-3" style="color: var(--text-primary);">
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center shadow-lg">
                                    <i data-lucide="pie-chart" class="w-5 h-5 text-white"></i>
                                </div>
                                Catégories
                            </h3>
                        </div>
                        <div class="space-y-3 max-h-96 overflow-y-auto">
                            ${Object.keys(stats.categorySales).length === 0 ? `
                                <p class="text-center text-sm py-8" style="color: var(--text-tertiary);">Aucune vente enregistrée</p>
                            ` : Object.entries(stats.categorySales)
                                .sort(([,a], [,b]) => b.revenue - a.revenue)
                                .map(([category, data]) => {
                                    const totalRevenue = Object.values(stats.categorySales).reduce((sum, cat) => sum + cat.revenue, 0);
                                    const percentage = totalRevenue > 0 ? (data.revenue / totalRevenue * 100).toFixed(1) : 0;
                                    return `
                                        <div class="p-3 rounded-lg" style="background: var(--bg-tertiary);">
                                            <div class="flex items-center justify-between mb-2">
                                                <span class="font-medium" style="color: var(--text-primary);">${category}</span>
                                                <span class="font-bold" style="color: var(--brand);">${formatCurrency(data.revenue)}</span>
                                            </div>
                                            <div class="flex items-center gap-3">
                                                <div class="flex-1 h-2 rounded-full overflow-hidden" style="background: var(--bg-primary);">
                                                    <div class="h-full rounded-full transition-all duration-500"
                                                         style="width: ${percentage}%; background: var(--brand);"></div>
                                                </div>
                                                <span class="text-xs font-bold w-12 text-right" style="color: var(--text-tertiary);">${percentage}%</span>
                                            </div>
                                            <div class="text-xs mt-1" style="color: var(--text-tertiary);">${data.count} article${data.count > 1 ? 's' : ''} vendu${data.count > 1 ? 's' : ''}</div>
                                        </div>
                                    `;
                                }).join('')}
                        </div>
                    </div>

                    <!-- Clients VIP -->
                    <div class="glass-card p-6 rounded-2xl" style="background: var(--glass-bg); border: 1px solid var(--border-color);">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-lg font-bold flex items-center gap-3" style="color: var(--text-primary);">
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-yellow-500 to-yellow-700 flex items-center justify-center shadow-lg">
                                    <i data-lucide="crown" class="w-5 h-5 text-white"></i>
                                </div>
                                Clients VIP
                            </h3>
                            <span class="text-xs px-3 py-1 rounded-full" style="background: var(--bg-tertiary); color: var(--text-secondary);">
                                Top 5
                            </span>
                        </div>
                        <div class="space-y-3">
                            ${stats.topClients.length === 0 ? `
                                <p class="text-center text-sm py-8" style="color: var(--text-tertiary);">Aucun client avec historique</p>
                            ` : stats.topClients.map((clientData, index) => `
                                <div class="flex items-center gap-3 p-3 rounded-lg transition-all hover:shadow-md" style="background: var(--bg-tertiary);">
                                    <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-white"
                                         style="background: linear-gradient(135deg, ${index === 0 ? '#FFD700, #FFA500' : '#10b981, #059669'});">
                                        ${index === 0 ? '👑' : (index + 1)}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="font-medium truncate" style="color: var(--text-primary);">
                                            ${clientData.client?.firstName} ${clientData.client?.lastName}
                                        </div>
                                        <div class="text-xs" style="color: var(--text-tertiary);">
                                            ${clientData.purchaseCount} achat${clientData.purchaseCount > 1 ? 's' : ''}
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <div class="font-bold" style="color: var(--brand);">${formatCurrency(clientData.totalSpent)}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Performance Mensuelle -->
                    <div class="glass-card p-6 rounded-2xl" style="background: var(--glass-bg); border: 1px solid var(--border-color);">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-lg font-bold flex items-center gap-3" style="color: var(--text-primary);">
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center shadow-lg">
                                    <i data-lucide="bar-chart-3" class="w-5 h-5 text-white"></i>
                                </div>
                                12 Derniers Mois
                            </h3>
                        </div>
                        <div class="space-y-2 max-h-96 overflow-y-auto">
                            ${Object.entries(stats.monthlyPerformance).reverse().map(([month, data]) => {
                                const [year, monthNum] = month.split('-');
                                const monthName = new Date(year, monthNum - 1).toLocaleDateString('fr-FR', { month: 'short', year: 'numeric' });
                                const maxRevenue = Math.max(...Object.values(stats.monthlyPerformance).map(m => m.revenue));
                                const barWidth = maxRevenue > 0 ? (data.revenue / maxRevenue * 100) : 0;

                                return `
                                    <div class="p-2 rounded-lg hover:bg-white/5 transition-colors">
                                        <div class="flex items-center justify-between mb-1">
                                            <span class="text-xs font-medium capitalize" style="color: var(--text-secondary);">${monthName}</span>
                                            <span class="text-sm font-bold" style="color: var(--text-primary);">${formatCurrency(data.revenue)}</span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <div class="flex-1 h-1.5 rounded-full overflow-hidden" style="background: var(--bg-primary);">
                                                <div class="h-full rounded-full transition-all duration-500"
                                                     style="width: ${barWidth}%; background: ${data.revenue > 0 ? 'var(--brand)' : 'var(--text-tertiary)'};"></div>
                                            </div>
                                            <span class="text-xs w-12 text-right" style="color: var(--text-tertiary);">${data.count} ${data.count > 1 ? 'ventes' : 'vente'}</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * Rendu de la page POS
         */
        renderPOS() {
            const s = window.store.state;
            const cartTotal = s.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const cartSubtotal = cartTotal / 1.2;
            const cartTax = cartTotal - cartSubtotal;
            const currentClient = s.currentClient ? s.clients.find(c => c.id === s.currentClient) : null;

            return `
                <div class="flex flex-col md:flex-row h-[calc(100vh-140px)] md:h-[calc(100vh-100px)] gap-6 animate-fade-in">
                    <!-- Zone produits -->
                    <div class="flex-1 flex flex-col overflow-hidden">
                        <!-- Sélection client -->
                        <div class="mb-4 glass-card p-4 rounded-xl">
                            <div class="flex items-center justify-between gap-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                                        <i data-lucide="user" class="w-5 h-5 text-white"></i>
                                    </div>
                                    <div>
                                        <div class="text-xs text-gray-400 uppercase tracking-wider">Client</div>
                                        <div class="font-bold text-white">
                                            ${currentClient ? `${currentClient.firstName} ${currentClient.lastName}` : 'Aucun client sélectionné'}
                                        </div>
                                    </div>
                                </div>
                                <button onclick="window.ui.openClientSelector()"
                                        class="bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white px-4 py-2 rounded-lg shadow-lg flex items-center gap-2 btn-press transition-all">
                                    <i data-lucide="user-plus" class="w-4 h-4"></i>
                                    <span class="text-sm">${currentClient ? 'Changer' : 'Sélectionner'}</span>
                                </button>
                            </div>
                        </div>

                        <!-- Barre de recherche -->
                        <div class="mb-6 flex gap-4">
                            <div class="relative flex-1 group">
                                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5 group-focus-within:text-brand transition-colors"></i>
                                <input
                                    type="text"
                                    id="pos-search"
                                    placeholder="Rechercher un bijou, une référence..."
                                    class="glass-input w-full pl-12 pr-4 py-4 rounded-xl shadow-lg"
                                    onkeyup="window.ui.filterProducts(this.value)"
                                    aria-label="Rechercher un produit"
                                    autofocus>
                            </div>
                        </div>

                        <!-- Grille de produits -->
                        <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto pr-2 pb-24 md:pb-4"
                             id="product-grid">
                            ${this.renderProductCards(s.products)}
                        </div>
                    </div>

                    <!-- Panneau panier -->
                    <div class="glass-panel w-full md:w-[400px] rounded-2xl flex flex-col overflow-hidden shadow-2xl border-l border-white/10
                                fixed bottom-16 left-0 right-0 h-[60vh] md:static md:h-full z-30
                                transition-transform transform translate-y-full md:translate-y-0"
                         id="cart-panel">
                        <!-- En-tête panier -->
                        <div class="p-5 border-b border-white/10 bg-white/5 flex justify-between items-center backdrop-blur-xl">
                            <h3 class="font-bold text-lg flex items-center gap-2">
                                <i data-lucide="shopping-cart" class="w-5 h-5 text-brand"></i> Panier
                                ${s.cart.length > 0 ? `<span class="bg-brand text-white text-[10px] px-2 py-0.5 rounded-full">${s.cart.length}</span>` : ''}
                            </h3>
                            <button class="md:hidden text-gray-400 hover:text-white transition-colors"
                                    onclick="$('#cart-panel').classList.add('translate-y-full')"
                                    aria-label="Fermer le panier">
                                <i data-lucide="chevron-down" class="w-6 h-6"></i>
                            </button>
                        </div>

                        <!-- Contenu panier -->
                        <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-black/20">
                            ${s.cart.length === 0 ? this.renderEmptyCart() : this.renderCartItems(s.cart)}
                        </div>

                        <!-- Résumé et paiement -->
                        <div class="p-6 bg-white/5 border-t border-white/10 backdrop-blur-xl">
                            <div class="space-y-2 mb-6">
                                <div class="flex justify-between items-center text-sm text-gray-400">
                                    <span>Sous-total HT</span>
                                    <span>${formatCurrency(cartSubtotal)}</span>
                                </div>
                                <div class="flex justify-between items-center text-sm text-gray-400">
                                    <span>TVA (20%)</span>
                                    <span>${formatCurrency(cartTax)}</span>
                                </div>
                                <div class="flex justify-between items-center pt-4 border-t border-white/10">
                                    <span class="text-lg font-bold text-white">Total TTC</span>
                                    <span class="text-2xl font-bold text-brand font-mono">${formatCurrency(cartTotal)}</span>
                                </div>
                            </div>
                            <button
                                onclick="window.store.checkout()"
                                class="w-full bg-gradient-to-r from-brand to-brand-dark hover:from-brand-dark hover:to-brand text-white font-bold py-4 rounded-xl shadow-2xl hover:shadow-brand/50 transition-all duration-300 flex justify-center items-center gap-3 btn-press relative overflow-hidden group ${s.cart.length === 0 ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105 hover:-translate-y-1'}"
                                ${s.cart.length === 0 ? 'disabled' : ''}>
                                <!-- Effet shimmer -->
                                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                                <span class="relative z-10">Encaisser</span>
                                <i data-lucide="credit-card" class="w-5 h-5 relative z-10 group-hover:rotate-12 transition-transform"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Bouton panier flottant (mobile) -->
                    ${s.cart.length > 0 ? `
                        <button class="md:hidden fixed bottom-20 right-4 bg-brand text-white p-4 rounded-full shadow-2xl z-40 flex items-center gap-2 btn-press"
                                onclick="$('#cart-panel').classList.remove('translate-y-full')"
                                aria-label="Ouvrir le panier">
                            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                            <span class="font-bold">${s.cart.length}</span>
                        </button>
                    ` : ''}
                </div>
            `;
        }

        /**
         * Rendu des cartes produits avec couleurs
         */
        renderProductCards(products) {
            if (!products || products.length === 0) {
                return `
                    <div class="col-span-full text-center text-gray-500 py-20">
                        <i data-lucide="package-x" class="w-16 h-16 mx-auto mb-4 opacity-30"></i>
                        <p class="text-lg mb-2">Aucun produit disponible</p>
                        <p class="text-sm opacity-70">Ajoutez des produits depuis l'inventaire</p>
                    </div>
                `;
            }

            return products.map(p => `
                <div class="glass-card rounded-xl p-3 cursor-pointer group flex flex-col h-full relative overflow-hidden btn-press ${p.stock === 0 ? 'opacity-50 cursor-not-allowed' : ''}"
                     onclick="${p.stock > 0 ? (p.hasVariants ? `window.ui.openVariantSelector('${p.id}')` : `window.store.addToCart(window.store.state.products.find(x => x.id === '${p.id}'))`) : ''}">

                    <!-- Image produit -->
                    <div class="aspect-square rounded-lg overflow-hidden mb-3 relative bg-black/20">
                        <img src="${p.image}"
                             class="w-full h-full object-cover ${p.stock > 0 ? 'group-hover:scale-110' : ''} transition-transform duration-700"
                             alt="${p.name}"
                             loading="lazy"
                             onerror="this.src='https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=400&h=400&fit=crop'">
                        <div class="absolute inset-0 bg-black/0 ${p.stock > 0 ? 'group-hover:bg-black/20' : ''} transition-colors duration-300"></div>

                        <!-- Badges -->
                        ${p.stock === 0
                            ? '<div class="absolute inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center"><span class="text-white font-bold text-sm">RUPTURE</span></div>'
                            : p.hasVariants

        /**
         * Filtrer l'historique des ventes
         */
        filterHistory(searchQuery = '') {
            const search = searchQuery || document.getElementById('history-search')?.value || '';
            const dateFilter = document.getElementById('history-date-filter')?.value || 'all';
            const amountFilter = document.getElementById('history-amount-filter')?.value || 'all';
            const dateFrom = document.getElementById('history-date-from')?.value;
            const dateTo = document.getElementById('history-date-to')?.value;

            // Afficher/masquer le sélecteur de dates personnalisé
            const customDateDiv = document.getElementById('custom-date-filter');
            if (customDateDiv) {
                customDateDiv.classList.toggle('hidden', dateFilter !== 'custom');
            }

            let sales = [...window.store.state.sales];
            const now = new Date();

            // Filtre par recherche
            if (search) {
                const term = search.toLowerCase();
                sales = sales.filter(sale => {
                    const client = sale.clientId ? window.store.state.clients.find(c => c.id === sale.clientId) : null;
                    const clientName = client ? `${client.firstName} ${client.lastName}`.toLowerCase() : '';
                    const invoiceNumber = `INV-${new Date(sale.date).getFullYear()}${String(new Date(sale.date).getMonth() + 1).padStart(2, '0')}${String(new Date(sale.date).getDate()).padStart(2, '0')}-${sale.id.slice(-6)}`.toLowerCase();
                    const itemNames = sale.items.map(item => item.name.toLowerCase()).join(' ');

                    return clientName.includes(term) ||
                           invoiceNumber.includes(term) ||
                           itemNames.includes(term) ||
                           sale.total.toString().includes(term);
                });
            }

            // Filtre par date
            if (dateFilter === 'today') {
                sales = sales.filter(sale => {
                    const saleDate = new Date(sale.date);
                    return saleDate.toDateString() === now.toDateString();
                });
            } else if (dateFilter === 'week') {
                const weekAgo = new Date(now);
                weekAgo.setDate(weekAgo.getDate() - 7);
                sales = sales.filter(sale => new Date(sale.date) >= weekAgo);
            } else if (dateFilter === 'month') {
                sales = sales.filter(sale => {
                    const saleDate = new Date(sale.date);
                    return saleDate.getMonth() === now.getMonth() &&
                           saleDate.getFullYear() === now.getFullYear();
                });
            } else if (dateFilter === 'custom' && dateFrom && dateTo) {
                const from = new Date(dateFrom);
                const to = new Date(dateTo);
                to.setHours(23, 59, 59);
                sales = sales.filter(sale => {
                    const saleDate = new Date(sale.date);
                    return saleDate >= from && saleDate <= to;
                });
            }

            // Filtre par montant
            if (amountFilter === 'low') {
                sales = sales.filter(sale => sale.total < 1000);
            } else if (amountFilter === 'medium') {
                sales = sales.filter(sale => sale.total >= 1000 && sale.total <= 5000);
            } else if (amountFilter === 'high') {
                sales = sales.filter(sale => sale.total > 5000);
            }

            // Trier par date décroissante
            sales.sort((a, b) => new Date(b.date) - new Date(a.date));

            // Afficher les résultats
            const historyList = document.getElementById('history-list');
            if (historyList) {
                if (sales.length === 0) {
                    historyList.innerHTML = `
                        <div class="glass-card p-12 rounded-xl text-center">
                            <i data-lucide="search-x" class="w-16 h-16 mx-auto mb-4 opacity-30" style="color: var(--text-tertiary);"></i>
                            <p class="text-lg mb-2" style="color: var(--text-primary);">Aucune vente trouvée</p>
                            <p class="text-sm" style="color: var(--text-secondary);">Essayez de modifier vos filtres de recherche</p>
                        </div>
                    `;
                } else {
                    historyList.innerHTML = sales.map(sale => this.renderSaleCard(sale)).join('');
                }
                lucide.createIcons();
            }
        }

        /**
         * Voir les détails d'une vente

        viewSaleDetails(saleId) {
            const sale = window.store.state.sales.find(s => s.id === saleId);
            if (!sale) return;

            // Pour l'instant, on affiche juste la facture
            this.printInvoice(sale);
        }

        /**
         * Gestion soumission formulaire client
         */
        handleClientSubmit(e, form, clientId) {
            e.preventDefault();
            const fd = new FormData(form);

            const clientData = {
                firstName: fd.get('firstName').trim(),
                lastName: fd.get('lastName').trim(),
                email: fd.get('email').trim(),
                phone: fd.get('phone').trim(),
                address: fd.get('address').trim(),
                notes: fd.get('notes').trim()
            };

            if (clientId) {
                window.store.updateClient(clientId, clientData);
            } else {
                window.store.addClient(clientData);
            }

            form.closest('.fixed').remove();
        }

        /**
         * Gestion de l'upload d'image locale
         */
        async handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;

            try {
                this.toast('Chargement de l\'image...', 'info');
                const base64 = await imageToBase64(file);

                // Stocker le Base64
                this.currentImagePreview = base64;
                $('#product-image-data').value = base64;

                // Afficher l'aperçu
                const preview = $('#image-preview-container');
                preview.innerHTML = `
                    <img src="${base64}" class="image-upload-preview" alt="Aperçu">
                `;

                // Effacer l'URL si elle existait
                $('#product-image-url').value = '';

                this.toast('Image chargée avec succès', 'success');
            } catch (error) {
                console.error('Image upload error:', error);
                this.toast(error.message || 'Erreur lors du chargement', 'error');

            }

        /**
         * Gestion de la soumission du formulaire produit
         */
        handleProductSubmit(e, form, productId = null) {
            e.preventDefault();

            const fd = new FormData(form);

            // Récupérer les couleurs depuis le nouveau système
            const colorsData = $('#product-colors-data').value;
            const colors = colorsData ? JSON.parse(colorsData) : [];

            // Récupérer l'image (Base64 ou URL)
            const imageData = $('#product-image-data').value || 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=400&h=400&fit=crop';

            // Vérifier le type de gestion de stock
            const stockType = fd.get('stockType');
            const hasVariants = stockType === 'variants';

            const product = {
                name: fd.get('name').trim(),
                reference: fd.get('reference').trim().toUpperCase(),
                category: fd.get('category').trim(),
                price: parseFloat(fd.get('price')),
                cost: parseFloat(fd.get('cost')),
                colors: colors,
                image: imageData,
                hasVariants: hasVariants
            };

            // Gérer le stock selon le type
            if (hasVariants) {
                // Récupérer les variantes
                const variantsData = $('#product-variants-data').value;
                const variants = variantsData ? JSON.parse(variantsData) : [];

                if (variants.length === 0) {
                    this.toast('Veuillez ajouter au moins une variante', 'error');
                    return;
                }

                product.variants = variants;
                // Le stock total est la somme des stocks de chaque variante
                product.stock = variants.reduce((sum, v) => sum + parseInt(v.stock || 0), 0);
            } else {
                product.stock = parseInt(fd.get('stock'));
                product.variants = [];
            }

            // Validation
            if (product.price <= 0 || product.cost <= 0 || product.stock < 0) {
                this.toast('Valeurs invalides', 'error');
                return;
            }

            if (product.cost >= product.price) {
                if (!confirm('Attention: Le coût est supérieur ou égal au prix de vente. Continuer ?')) {
                    return;
                }
            }

            // Mode édition ou ajout
            if (productId) {
                window.store.updateProduct(productId, product);
                this.toast('Produit modifié avec succès', 'success');
            } else {
                window.store.addProduct(product);
            }

            form.closest('.fixed').remove();

            // Reset preview et couleurs
            this.currentImagePreview = null;
            this.selectedColors = [];
        }

        /**
         * Ajouter une variante spécifique au panier
         */
        addVariantToCart(productId, variantIndex) {
            const product = window.store.state.products.find(p => p.id === productId);
            if (!product || !product.variants || !product.variants[variantIndex]) {
                this.toast('Variante introuvable', 'error');
                return;
            }

            const variant = product.variants[variantIndex];
            if (variant.stock <= 0) {
                this.toast('Cette variante est en rupture de stock', 'error');
                return;
            }

            // Créer un ID unique pour cette variante dans le panier
            const variantId = `${productId}_v${variantIndex}`;

            // Vérifier si cette variante est déjà dans le panier
            const existing = window.store.state.cart.find(item => item.variantId === variantId);

            if (existing) {
                if (existing.qty < variant.stock) {
                    existing.qty++;
                    this.toast('Quantité augmentée', 'success');
                } else {
                    this.toast('Stock insuffisant pour cette variante', 'error');
                    return;
                }
            } else {
                // Ajouter au panier avec les infos de la variante
                const variantLabel = [
                    variant.size ? `Taille ${variant.size}` : '',
                    variant.metal ? variant.metal : '',
                    variant.carats ? variant.carats : ''
                ].filter(v => v).join(' • ');

                window.store.state.cart.push({
                    ...product,
                    qty: 1,
                    variantId: variantId,
                    variantIndex: variantIndex,
                    variantLabel: variantLabel || 'Variante ' + (variantIndex + 1),
                    stock: variant.stock // Le stock de cette variante spécifique
                });
                this.toast(`${product.name} (${variantLabel}) ajouté au panier`, 'success');
            }

            window.store.notify();
        }

        /**
         * Définir le filtre de période pour le graphique
         */
        setPeriodFilter(period) {
            // Mettre à jour les boutons actifs
            document.querySelectorAll('.period-filter').forEach(btn => {
                if (btn.dataset.period === period) {
                    btn.classList.add('active');
                    btn.style.background = 'var(--brand)';
                    btn.style.color = 'white';
                } else {
                    btn.classList.remove('active');
                    btn.style.background = 'var(--bg-tertiary)';
                    btn.style.color = 'var(--text-secondary)';
                }
            });

            // Mettre à jour le label
            const periodLabel = document.getElementById('period-label');
            const customDateRange = document.getElementById('custom-date-range');

            if (period === 'day') {
                periodLabel.textContent = "Aujourd'hui";
                customDateRange.classList.add('hidden');
                initWeeklyChart('day');
            } else if (period === 'week') {
                periodLabel.textContent = 'Hebdomadaire';
                customDateRange.classList.add('hidden');
                initWeeklyChart('week');
            } else if (period === 'month') {
                periodLabel.textContent = 'Mensuelle';
                customDateRange.classList.add('hidden');
                initWeeklyChart('month');
            } else if (period === 'custom') {
                periodLabel.textContent = 'Personnalisée';
                customDateRange.classList.remove('hidden');

                // Initialiser les dates par défaut
                const today = new Date();
                const weekAgo = new Date(today);
                weekAgo.setDate(weekAgo.getDate() - 7);

                document.getElementById('date-from').value = weekAgo.toISOString().split('T')[0];
                document.getElementById('date-to').value = today.toISOString().split('T')[0];
            }
        }

        /**
         * Appliquer la période personnalisée
         */
        applyCustomDateRange() {
            const dateFrom = document.getElementById('date-from').value;
            const dateTo = document.getElementById('date-to').value;

            if (!dateFrom || !dateTo) {
                this.toast('Veuillez sélectionner les deux dates', 'error');
                return;
            }

            if (new Date(dateFrom) > new Date(dateTo)) {
                this.toast('La date de début doit être avant la date de fin', 'error');
                return;
            }

            // Mettre à jour le label avec les dates
            const periodLabel = document.getElementById('period-label');
            const from = new Date(dateFrom);
            const to = new Date(dateTo);
            periodLabel.textContent = `${from.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })} - ${to.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })}`;

            // Initialiser le graphique avec les dates personnalisées
            initWeeklyChart('custom', dateFrom, dateTo);
        }

        /**
         * Gérer l'upload du logo
         */
        async handleLogoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Vérifier le type de fichier
            const validTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/svg+xml'];
            if (!validTypes.includes(file.type)) {
                this.toast('Format invalide. Utilisez PNG, JPG ou SVG', 'error');
                return;
            }

            // Vérifier la taille (2 Mo max)
            const maxSize = 2 * 1024 * 1024; // 2 Mo en octets
            if (file.size > maxSize) {
                this.toast('Fichier trop volumineux. Maximum 2 Mo', 'error');
                return;
            }

            try {
                // Pour les SVG, lire directement
                if (file.type === 'image/svg+xml') {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        window.store.updateSettings({ logo: e.target.result });
                        this.updateLogoPreview(e.target.result);
                        this.toast('Logo mis à jour avec succès', 'success');
                    };
                    reader.readAsDataURL(file);
                    return;
                }

                // Pour PNG/JPG, redimensionner si nécessaire
                const resizedImage = await this.resizeImage(file, 300, 300);
                window.store.updateSettings({ logo: resizedImage });
                this.updateLogoPreview(resizedImage);
                this.toast('Logo mis à jour avec succès', 'success');

            } catch (error) {
                console.error('Erreur upload logo:', error);
                this.toast('Erreur lors du chargement du logo', 'error');
            }
        }

        /**
         * Redimensionner une image
         */
        resizeImage(file, maxWidth, maxHeight) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        // Calculer les nouvelles dimensions
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth || height > maxHeight) {
                            const ratio = Math.min(maxWidth / width, maxHeight / height);
                            width = width * ratio;
                            height = height * ratio;
                        }

                        // Créer un canvas pour redimensionner
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Convertir en Base64
                        const resizedBase64 = canvas.toDataURL(file.type, 0.9);
                        resolve(resizedBase64);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        /**
         * Exporter les ventes en CSV comptable
         */
        exportAccountingCSV() {
            const dateFrom = document.getElementById('export-date-from')?.value;
            const dateTo = document.getElementById('export-date-to')?.value;

            if (!dateFrom || !dateTo) {
                this.toast('Veuillez sélectionner les dates', 'warning');
                return;
            }

            // Filtrer les ventes par période
            const sales = window.store.state.sales.filter(sale => {
                const saleDate = new Date(sale.date).toISOString().slice(0, 10);
                return saleDate >= dateFrom && saleDate <= dateTo;
            });

            if (sales.length === 0) {
                this.toast('Aucune vente sur cette période', 'warning');
                return;
            }

            // Créer le CSV
            const headers = ['Date', 'N° Facture', 'Client', 'Montant HT', 'TVA 20%', 'Montant TTC'];
            const rows = sales.map(sale => {
                const client = sale.clientId ? window.store.state.clients.find(c => c.id === sale.clientId) : null;
                const clientName = client ? `${client.firstName} ${client.lastName}` : 'Anonyme';
                const saleDate = new Date(sale.date);
                const invoiceNumber = `INV-${saleDate.getFullYear()}${String(saleDate.getMonth() + 1).padStart(2, '0')}${String(saleDate.getDate()).padStart(2, '0')}-${sale.id.slice(-6).toUpperCase()}`;

                const totalTTC = sale.total;
                const totalHT = totalTTC / 1.2;
                const tva = totalTTC - totalHT;

                return [
                    saleDate.toLocaleDateString('fr-FR'),
                    invoiceNumber,
                    clientName,
                    totalHT.toFixed(2),
                    tva.toFixed(2),
                    totalTTC.toFixed(2)
                ];
            });

            // Ajouter ligne de total
            const totalTTC = sales.reduce((sum, s) => sum + s.total, 0);
            const totalHT = totalTTC / 1.2;
            const totalTVA = totalTTC - totalHT;
            rows.push(['', '', 'TOTAL', totalHT.toFixed(2), totalTVA.toFixed(2), totalTTC.toFixed(2)]);

            const csvContent = [headers, ...rows]
                .map(row => row.join(';'))
                .join('\n');

            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const filename = `comptabilite_${dateFrom}_${dateTo}.csv`;

            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            this.toast(`Export comptable créé: ${sales.length} ventes`, 'success');
        }

        /**
         * Exporter les ventes avec détail complet
         */
        exportAccountingDetailed() {
            const dateFrom = document.getElementById('export-date-from')?.value;
            const dateTo = document.getElementById('export-date-to')?.value;

            if (!dateFrom || !dateTo) {
                this.toast('Veuillez sélectionner les dates', 'warning');
                return;
            }

            // Filtrer les ventes par période
            const sales = window.store.state.sales.filter(sale => {
                const saleDate = new Date(sale.date).toISOString().slice(0, 10);
                return saleDate >= dateFrom && saleDate <= dateTo;
            });

            if (sales.length === 0) {
                this.toast('Aucune vente sur cette période', 'warning');
                return;
            }

            // Créer le CSV détaillé
            const headers = ['Date', 'N° Facture', 'Client', 'Produit', 'Référence', 'Qté', 'Prix Unit. HT', 'Total HT', 'TVA 20%', 'Total TTC'];
            const rows = [];

            sales.forEach(sale => {
                const client = sale.clientId ? window.store.state.clients.find(c => c.id === sale.clientId) : null;
                const clientName = client ? `${client.firstName} ${client.lastName}` : 'Anonyme';
                const saleDate = new Date(sale.date);
                const invoiceNumber = `INV-${saleDate.getFullYear()}${String(saleDate.getMonth() + 1).padStart(2, '0')}${String(saleDate.getDate()).padStart(2, '0')}-${sale.id.slice(-6).toUpperCase()}`;

                sale.items.forEach(item => {
                    const product = window.store.state.products.find(p => p.id === item.id);
                    const reference = product?.reference || item.id.slice(0, 8).toUpperCase();

                    const priceUnitTTC = item.price;
                    const priceUnitHT = priceUnitTTC / 1.2;
                    const totalTTC = priceUnitTTC * item.qty;
                    const totalHT = totalTTC / 1.2;
                    const tva = totalTTC - totalHT;

                    let productName = item.name;
                    if (item.variantLabel) {
                        productName += ` (${item.variantLabel})`;
                    }

                    rows.push([
                        saleDate.toLocaleDateString('fr-FR'),
                        invoiceNumber,
                        clientName,
                        productName,
                        reference,
                        item.qty,
                        priceUnitHT.toFixed(2),
                        totalHT.toFixed(2),
                        tva.toFixed(2),
                        totalTTC.toFixed(2)
                    ]);
                });
            });

            // Ajouter ligne de total
            const totalTTC = sales.reduce((sum, s) => sum + s.total, 0);
            const totalHT = totalTTC / 1.2;
            const totalTVA = totalTTC - totalHT;
            rows.push(['', '', '', '', '', '', '', totalHT.toFixed(2), totalTVA.toFixed(2), totalTTC.toFixed(2)]);

            const csvContent = [headers, ...rows]
                .map(row => row.join(';'))
                .join('\n');

            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const filename = `comptabilite_detaillee_${dateFrom}_${dateTo}.csv`;

            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            this.toast(`Export détaillé créé: ${sales.length} ventes`, 'success');
        }

        /**
         * Import des données
         */
        importData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);

                    // Validation du format
                    if (!data.products || !data.sales || !data.settings) {
                        throw new Error("Format de fichier invalide");
                    }

                    if (confirm("⚠️ Attention: Cette action écrasera toutes les données actuelles. Continuer ?")) {
                        window.store.state = {
                            ...window.store.state,
                            ...data,
                            isOnline: navigator.onLine
                        };
                        window.store.save();
                        window.router.refresh();
                        this.toast('Données restaurées avec succès', 'success');
                    }
                } catch (err) {
                    console.error('Erreur import:', err);
                    this.toast('Fichier de sauvegarde invalide', 'error');
                }

                // Reset input
                input.value = '';
            };

            reader.onerror = () => {
                this.toast('Erreur de lecture du fichier', 'error');
                input.value = '';
            };

            reader.readAsText(file);
        }
    }

    class Router {
        constructor() {
            this.routes = {
                'dashboard': () => window.ui.renderDashboard(),
                'pos': () => window.ui.renderPOS(),
                'clients': () => window.ui.renderClients(),
                'inventory': () => window.ui.renderInventory(),
                'history': () => window.ui.renderHistory(),
                'settings': () => window.ui.renderSettings()
            };
            this.currentPage = 'dashboard';
        }

        /**
         * Navigation entre les pages
         */
        navigate(page) {
            if (!this.routes[page]) return;

            this.currentPage = page;
            const container = $('#page-container');
            if (!container) return;

            // Animation de sortie
            container.style.opacity = '0';
            container.style.transform = 'translateY(10px)';

            setTimeout(() => {
                // Rendu de la nouvelle page
                container.innerHTML = this.routes[page]();
                lucide.createIcons();

                // Mise à jour de l'état actif de la navigation
                $$('.nav-btn').forEach(btn => {
                    const isActive = btn.getAttribute('onclick')?.includes(page);
                    if (isActive) {
                        btn.classList.add('text-brand', 'bg-white/10');
                        btn.classList.remove('text-gray-400');
                    } else {
                        btn.classList.remove('text-brand', 'bg-white/10');
                        btn.classList.add('text-gray-400');
                    }
                });

                // Animation d'entrée
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';

                // Scroll vers le haut
                container.scrollTop = 0;

                // Corriger les couleurs après le rendu
                setTimeout(() => {
                    if (typeof fixTextColors === 'function') {
                        fixTextColors();
                    }
                    // Initialiser le graphique si on est sur le dashboard
                    if (this.currentPage === 'dashboard' && typeof initWeeklyChart === 'function') {
                        initWeeklyChart();
                    }
                }, 100);
            }, 200);
        }

        /**
         * Rafraîchissement de la page actuelle
         */
        refresh() {
            this.navigate(this.currentPage);
            // Corriger les couleurs après le rendu
            setTimeout(() => {
                if (typeof fixTextColors === 'function') {
                    fixTextColors();
                }
            }, 50);
        }
    }

    function initWeeklyChart(period = 'week', startDate = null, endDate = null) {
        setTimeout(() => {
            const ctx = document.getElementById('weeklyChart');
            if (!ctx || typeof Chart === 'undefined') return;

            // Détruire le graphique existant s'il y en a un

            const textColor = isDark ? '#cbd5e1' : '#475569';
            const gridColor = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';

            // Récupérer les données de ventes filtrées
            const { labels, data } = getChartData(period, startDate, endDate);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ventes',
                        data: data,
                        backgroundColor: 'rgba(16, 185, 129, 0.8)',
                        borderColor: 'rgba(16, 185, 129, 1)',
                        borderWidth: 0,
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },

                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(16, 185, 129, 0.95)',

                            bodyColor: '#fff',
                            padding: 12,

                                label: (context) => formatCurrency(context.parsed.y)
                            }

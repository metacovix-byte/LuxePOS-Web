<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LuxePOS — App complète</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>html,body{margin:0;padding:0;background:#ece7da;}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="screens-3.jsx"></script>
<script type="text/babel">
function DesktopApp({ initial }) {
  const [active, setActive] = React.useState(initial || 'home');
  let Screen = HomeScreen;
  const titles = { home: 'Tableau', pos: 'Caisse', inbox: 'Boîte', lumi: 'Lumi', catalog: 'Catalogue', stock: 'Stock', customers: 'Clientèle', sales: 'Ventes', reports: 'Compta', settings: 'Réglages', addProduct: 'Nouvelle pièce' };
  if (active === 'pos') Screen = POSScreen;
  else if (active === 'catalog') Screen = CatalogScreen;
  else if (active === 'addProduct') Screen = AddProductScreen;
  else if (active === 'stock') Screen = StockScreen;
  else if (active === 'customers') Screen = CustomersScreen;
  else if (active === 'sales') Screen = SalesScreen;
  else if (active === 'inbox') Screen = InboxScreen;
  else if (active === 'lumi') Screen = LumiFullScreen;
  else if (active === 'reports') Screen = ReportsScreen;
  else if (active === 'settings') Screen = SettingsScreen;
  return (
    <WindowChrome title={"LuxePOS · " + (titles[active] || 'Tableau')}>
      <Sidebar active={active} onChange={setActive} />
      <div className="ds-main"><Screen onPick={() => setActive('addProduct')} /></div>
    </WindowChrome>
  );
}

function Phone({ children }) {
  return (
    <div style={{ width: 393, height: 852, borderRadius: 48, background: '#1a1714', padding: 8, boxShadow: '0 24px 64px rgba(0,0,0,.2)' }}>
      <div style={{ width: '100%', height: '100%', borderRadius: 42, overflow: 'hidden', position: 'relative', background: 'var(--bg)' }}>{children}</div>
    </div>
  );
}

function Tablet({ children }) {
  return (
    <div style={{ width: 1024, height: 768, borderRadius: 24, background: '#1a1714', padding: 12, boxShadow: '0 24px 64px rgba(0,0,0,.2)' }}>
      <div style={{ width: '100%', height: '100%', borderRadius: 14, overflow: 'hidden', background: 'var(--bg)' }}>{children}</div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="login" title="Login & Onboarding" subtitle="Premiers pas · authentification + setup boutique">
        <DCArtboard id="login" label="Login" width={1280} height={820}><LoginScreen /></DCArtboard>
        <DCArtboard id="ob" label="Onboarding · étape 3 / 4" width={1280} height={820}><OnboardingScreen /></DCArtboard>
      </DCSection>
      <DCSection id="desktop" title="Application Desktop" subtitle="11 écrans · usage caisse boutique · 1280 × 820">
        <DCArtboard id="home" label="Tableau de bord" width={1280} height={820}><DesktopApp initial="home" /></DCArtboard>
        <DCArtboard id="pos" label="Caisse · POS" width={1280} height={820}><DesktopApp initial="pos" /></DCArtboard>
        <DCArtboard id="catalog" label="Catalogue" width={1280} height={820}><DesktopApp initial="catalog" /></DCArtboard>
        <DCArtboard id="addProduct" label="Ajouter une pièce" width={1280} height={820}><DesktopApp initial="addProduct" /></DCArtboard>
        <DCArtboard id="stock" label="Stock & inventaire" width={1280} height={820}><DesktopApp initial="stock" /></DCArtboard>
        <DCArtboard id="customers" label="Clientèle" width={1280} height={820}><DesktopApp initial="customers" /></DCArtboard>
        <DCArtboard id="sales" label="Historique des ventes" width={1280} height={820}><DesktopApp initial="sales" /></DCArtboard>
        <DCArtboard id="inbox" label="Boîte de réception" width={1280} height={820}><DesktopApp initial="inbox" /></DCArtboard>
        <DCArtboard id="lumi" label="Lumi · plein écran" width={1280} height={820}><DesktopApp initial="lumi" /></DCArtboard>
        <DCArtboard id="reports" label="Compta & rapports" width={1280} height={820}><DesktopApp initial="reports" /></DCArtboard>
        <DCArtboard id="settings" label="Réglages" width={1280} height={820}><DesktopApp initial="settings" /></DCArtboard>
      </DCSection>
      <DCSection id="tablet" title="iPad · Caisse mobile en boutique" subtitle="1024 × 768 paysage">
        <DCArtboard id="tab-pos" label="iPad · Caisse" width={1056} height={800}><Tablet><TabletPOS /></Tablet></DCArtboard>
      </DCSection>
      <DCSection id="mobile" title="iPhone · En déplacement" subtitle="393 × 852">
        <DCArtboard id="m-home" label="Mobile · Accueil" width={425} height={884}><Phone><MobileDash /></Phone></DCArtboard>
        <DCArtboard id="m-add" label="Mobile · Ajouter pièce avec photo" width={425} height={884}><Phone><MobileAddProduct /></Phone></DCArtboard>
        <DCArtboard id="m-lumi" label="Mobile · Lumi" width={425} height={884}><Phone><MobileLumi /></Phone></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
